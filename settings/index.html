<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      /*
       * Homey wraps this page in its own webview and applies dark mode as a
       * post-render inversion of the app chrome around us — the page itself
       * is always painted in light mode and never sees prefers-color-scheme
       * or any dark-mode class. So: light-mode-only palette, anchored on
       * pure #fff/#000 (off-tones invert to muddy gray instead of clean
       * black/white). Do not add a dark-mode media query back in.
       */
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-soft: #f5f6f8;
        --border: #e6e8ec;
        --text: #000000;
        --text-soft: #6b7280;
        --text-faint: #9aa1ad;
        --brand: #2563eb;
        --brand-soft: #eaf0ff;
        --danger: #ef4444;
        --danger-soft: #fef2f2;
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 16px rgba(16, 24, 40, 0.06);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 24px 18px 56px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .wrap { max-width: 720px; margin: 0 auto; }

      .intro {
        color: var(--text-soft);
        margin: 0 0 24px;
        font-size: 14px;
      }

      .tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        margin: 4px 0 18px;
        background: var(--surface-soft);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .tab {
        flex: 1;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-soft);
        background: transparent;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
      }
      .tab:hover { color: var(--text); }
      .tab.is-active {
        color: var(--brand);
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .tab .count {
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-soft);
        background: var(--border);
        border-radius: 999px;
      }
      .tab.is-active .count { color: #fff; background: var(--brand); }

      .panel { display: none; }
      .panel.is-active { display: block; }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .pat-card { margin-bottom: 8px; }

      .links { display: flex; flex-direction: column; gap: 10px; }

      .link {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: border-color 0.15s ease;
      }
      .link.is-open { border-color: var(--brand); }

      .link-summary {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        cursor: pointer;
        user-select: none;
      }
      .link-summary:hover { background: var(--surface-soft); }
      .link-caret {
        flex: none;
        width: 18px;
        color: var(--text-faint);
        font-size: 12px;
        transition: transform 0.15s ease;
      }
      .link.is-open .link-caret { transform: rotate(90deg); }
      .link-summary-text { flex: 1; min-width: 0; }
      .link-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .link-sub {
        font-size: 12px;
        color: var(--text-faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .link-badge {
        flex: none;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 999px;
        color: var(--brand);
        background: var(--brand-soft);
        text-transform: capitalize;
      }
      .link-badge.warn { color: var(--danger); background: var(--danger-soft); }

      .link-body {
        display: none;
        flex-direction: column;
        gap: 14px;
        padding: 16px;
        border-top: 1px solid var(--border);
      }
      .link.is-open .link-body { display: flex; }

      .row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
        gap: 12px;
        align-items: end;
      }

      .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

      label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--text-faint) !important;
      }

      select, input {
        width: 100%;
        height: 38px;
        padding: 0 11px;
        font-size: 14px;
        color: var(--text);
        background: var(--surface-soft);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        appearance: none;
        -webkit-appearance: none;
      }
      select {
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'12'%20height%3D'8'%20viewBox%3D'0%200%2012%208'%3E%3Cpath%20fill%3D'%239aa1ad'%20d%3D'M6%208L0%200h12z'%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 30px;
        cursor: pointer;
      }
      input::placeholder { color: var(--text-faint); }
      select:focus, input:focus {
        border-color: var(--brand);
        background: var(--surface);
        box-shadow: 0 0 0 3px var(--brand-soft);
      }
      input.step { max-width: 110px; }

      .remove {
        height: 38px;
        flex: none;
        padding: 0 14px;
        background: var(--danger-soft);
        color: var(--danger);
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .remove:hover { background: var(--danger); color: #fff; }

      .hint {
        font-size: 12px;
        color: var(--text-faint);
        line-height: 1.45;
        margin: 0;
      }

      .empty {
        color: var(--text-faint);
        font-style: normal;
        text-align: center;
        padding: 22px 12px;
        background: var(--surface-soft);
        border: 1px dashed var(--border);
        border-radius: var(--radius);
      }

      .toolbar {
        position: sticky;
        bottom: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 26px;
        padding: 14px 0 4px;
        background: linear-gradient(to top, var(--bg) 60%, transparent);
      }

      button.action {
        height: 42px;
        padding: 0 18px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: transform 0.05s ease, background 0.15s ease, border-color 0.15s ease;
      }
      button.action:hover { border-color: var(--brand); color: var(--brand); }
      button.action:active { transform: translateY(1px); }

      #save {
        margin-left: auto;
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }
      #save:hover { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

      @media (max-width: 620px) {
        .row { grid-template-columns: 1fr; }
        .remove { width: 100%; }
        #save, #add, #addSensor { flex: 1 1 100%; }
        #save { margin-left: 0; order: -1; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="intro" data-i18n="settings.intro"></p>

      <div class="card pat-card">
        <div class="field">
          <label data-i18n="settings.patLabel"></label>
          <input type="password" id="pat" autocomplete="off" spellcheck="false">
          <span class="hint" data-i18n="settings.patHint"></span>
        </div>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab is-active" id="tabSwitches" role="tab">
          <span data-i18n="settings.switchesTitle"></span><span class="count" id="countSwitches">0</span>
        </button>
        <button class="tab" id="tabSensors" role="tab">
          <span data-i18n="settings.sensorsTitle"></span><span class="count" id="countSensors">0</span>
        </button>
      </div>

      <div class="panel is-active" id="panelSwitches" role="tabpanel">
        <div id="links" class="links"></div>
        <p id="empty" class="empty" data-i18n="settings.empty"></p>
      </div>

      <div class="panel" id="panelSensors" role="tabpanel">
        <div id="sensorLinks" class="links"></div>
        <p id="sensorEmpty" class="empty" data-i18n="settings.sensorEmpty"></p>
      </div>

      <div class="toolbar">
        <button class="action" id="add" data-i18n="settings.add"></button>
        <button class="action" id="addSensor" data-i18n="settings.addSensor"></button>
        <button class="action" id="save" data-i18n="settings.save"></button>
      </div>
    </div>
    <script type="text/javascript">
      let switches = [];
      let lights = [];
      let sensors = [];
      let links = [];
      let sensorLinks = [];
      let homeyRef = null;
      let activeTab = 'switches';

      function setTab(tab) {
        activeTab = tab;
        const onSwitches = tab === 'switches';
        document.getElementById('tabSwitches').classList.toggle('is-active', onSwitches);
        document.getElementById('tabSensors').classList.toggle('is-active', !onSwitches);
        document.getElementById('panelSwitches').classList.toggle('is-active', onSwitches);
        document.getElementById('panelSensors').classList.toggle('is-active', !onSwitches);
        document.getElementById('add').style.display = onSwitches ? '' : 'none';
        document.getElementById('addSensor').style.display = onSwitches ? 'none' : '';
      }

      function updateCounts() {
        document.getElementById('countSwitches').textContent = String(links.length);
        document.getElementById('countSensors').textContent = String(sensorLinks.length);
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;',
        }[char]));
      }

      function deviceLabel(d) {
        const zone = d.zone ? d.zone + ' / ' : '';
        const suffix = d.type === 'dial' ? ' (IKEA dial)' : d.type === 'dual' ? ' (IKEA 2-button)' : '';
        return zone + d.name + suffix;
      }

      function nameOf(list, id, fallback) {
        const d = list.find((x) => x.id === id);
        return d ? d.name : (fallback || '');
      }

      // Build the collapsed-row summary for a switch link.
      function switchSummary(link) {
        const swName = nameOf(switches, link.switchId);
        if (!swName) return { title: '', sub: '', mode: '', incomplete: true };

        let sub;
        let incomplete = false;
        if (link.type === 'dial') {
          const named = link.slots
            .map((s) => nameOf(lights, s.lightId))
            .filter(Boolean);
          sub = named.length ? named.join(', ') : '';
          incomplete = named.length === 0;
          return { title: swName, sub, mode: 'dial', incomplete };
        }
        if (link.mode === 'split') {
          const a = nameOf(lights, link.lightId);
          const b = nameOf(lights, link.lightId2);
          sub = [a, b].filter(Boolean).join('  •  ');
          incomplete = !a || !b;
        } else {
          sub = nameOf(lights, link.lightId);
          incomplete = !sub;
        }
        return { title: swName, sub, mode: link.mode || 'dimmer', incomplete };
      }

      // Build the collapsed-row summary for a sensor link.
      function sensorSummary(link) {
        const sName = nameOf(sensors, link.sensorId);
        if (!sName) return { title: '', sub: '', mode: '', incomplete: true };
        const lightName = nameOf(lights, link.lightId);
        const sub = lightName
          ? lightName + '  •  ' + link.timeoutMinutes + ' min'
          : '';
        return { title: sName, sub, mode: link.mode || 'normal', incomplete: !lightName };
      }

      // Decorate a row container with a clickable summary header. `built` is the
      // summary object; `body` is the HTMLElement holding the editable fields.
      function makeCollapsible(link, built, body) {
        const row = document.createElement('div');
        row.className = 'link' + (link._open ? ' is-open' : '');

        const summary = document.createElement('div');
        summary.className = 'link-summary';
        const badge = built.mode
          ? '<span class="link-badge' + (built.incomplete ? ' warn' : '') + '">' + escapeHtml(built.mode) + '</span>'
          : '';
        summary.innerHTML = ''
          + '<span class="link-caret">▶</span>'
          + '<span class="link-summary-text">'
          + '<div class="link-title">' + (escapeHtml(built.title) || '<span style="color:var(--text-faint)">Not configured</span>') + '</div>'
          + (built.sub ? '<div class="link-sub">' + escapeHtml(built.sub) + '</div>' : '')
          + '</span>'
          + badge;

        summary.addEventListener('click', () => {
          link._open = !link._open;
          row.classList.toggle('is-open', link._open);
        });

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'link-body';
        bodyWrap.appendChild(body);

        row.appendChild(summary);
        row.appendChild(bodyWrap);
        return row;
      }

      function switchOptionsHtml(selectedId) {
        let html = '<option value=""></option>';
        for (const d of switches) {
          const sel = d.id === selectedId ? ' selected' : '';
          html += '<option value="' + escapeHtml(d.id) + '"' + sel + '>' + escapeHtml(deviceLabel(d)) + '</option>';
        }
        return html;
      }

      function lightOptionsHtml(selectedId) {
        let html = '<option value=""></option>';
        for (const d of lights) {
          const sel = d.id === selectedId ? ' selected' : '';
          const zone = d.zone ? d.zone + ' / ' : '';
          html += '<option value="' + escapeHtml(d.id) + '"' + sel + '>' + escapeHtml(zone + d.name) + '</option>';
        }
        return html;
      }

      function sensorOptionsHtml(selectedId) {
        let html = '<option value=""></option>';
        for (const d of sensors) {
          const sel = d.id === selectedId ? ' selected' : '';
          const zone = d.zone ? d.zone + ' / ' : '';
          html += '<option value="' + escapeHtml(d.id) + '"' + sel + '>' + escapeHtml(zone + d.name) + '</option>';
        }
        return html;
      }

      function selectedSwitch(link) {
        return switches.find((x) => x.id === link.switchId) || null;
      }

      function normalizeLink(link) {
        const sw = selectedSwitch(link);
        link.type = sw ? sw.type : link.type || '';
        if (link.type === 'dual') {
          link.mode = link.mode || 'dimmer';
          link.lightId = link.lightId || '';
          link.lightId2 = link.lightId2 || '';
          link.holdLightId = link.holdLightId || '';
          link.holdLightId2 = link.holdLightId2 || '';
        } else if (link.type === 'dial') {
          link.mode = 'dial';
          link.slots = Array.isArray(link.slots) ? link.slots : [{ lightId: '' }, { lightId: '' }, { lightId: '' }];
          while (link.slots.length < 3) link.slots.push({ lightId: '' });
          link.slots = link.slots.slice(0, 3).map((slot) => ({ lightId: slot && slot.lightId ? slot.lightId : '' }));
        }
        link.fadeStep = Number.isFinite(Number(link.fadeStep)) ? Math.abs(Number(link.fadeStep)) : 8;
        return link;
      }

      function renderDualFields(link) {
        const showSecond = link.mode === 'split';
        const showHold = link.mode === 'onoff' || link.mode === 'split';
        let html = ''
          + '<div class="field"><label data-i18n="settings.mode"></label><select data-role="mode">'
          + '<option value="dimmer"' + (link.mode === 'dimmer' ? ' selected' : '') + ' data-i18n="settings.modeDimmer"></option>'
          + '<option value="onoff"' + (link.mode === 'onoff' ? ' selected' : '') + ' data-i18n="settings.modeOnoff"></option>'
          + '<option value="split"' + (link.mode === 'split' ? ' selected' : '') + ' data-i18n="settings.modeSplit"></option>'
          + '</select></div>'
          + '<div class="field"><label data-i18n="' + (showSecond ? 'settings.topLight' : 'settings.light') + '"></label><select data-role="light">' + lightOptionsHtml(link.lightId) + '</select></div>'
          + '<div class="field" style="' + (showSecond ? '' : 'display:none') + '"><label data-i18n="settings.bottomLight"></label><select data-role="light2">' + lightOptionsHtml(link.lightId2) + '</select></div>'
          + '<div class="field" style="' + (link.mode === 'dimmer' ? '' : 'display:none') + '"><label data-i18n="settings.fadeStep"></label><input class="step" type="number" min="1" max="100" data-role="fadeStep" value="' + link.fadeStep + '"></div>';

        if (showHold) {
          const holdLabel = showSecond ? 'settings.topHoldLight' : 'settings.holdLight';
          html += '<div class="field"><label data-i18n="' + holdLabel + '"></label><select data-role="holdLight">' + lightOptionsHtml(link.holdLightId) + '</select></div>';
          if (showSecond) {
            html += '<div class="field"><label data-i18n="settings.bottomHoldLight"></label><select data-role="holdLight2">' + lightOptionsHtml(link.holdLightId2) + '</select></div>';
          }
        }

        return html;
      }

      function renderDialFields(link) {
        return ''
          + '<div class="field"><label data-i18n="settings.slot1"></label><select data-role="slot1">' + lightOptionsHtml(link.slots[0].lightId) + '</select></div>'
          + '<div class="field"><label data-i18n="settings.slot2"></label><select data-role="slot2">' + lightOptionsHtml(link.slots[1].lightId) + '</select></div>'
          + '<div class="field"><label data-i18n="settings.slot3"></label><select data-role="slot3">' + lightOptionsHtml(link.slots[2].lightId) + '</select></div>'
          + '<div class="field"><label data-i18n="settings.fadeStep"></label><input class="step" type="number" min="1" max="100" data-role="fadeStep" value="' + link.fadeStep + '"></div>';
      }

      function render() {
        const container = document.getElementById('links');
        const empty = document.getElementById('empty');
        container.innerHTML = '';
        empty.style.display = links.length ? 'none' : 'block';

        links.forEach((link, index) => {
          normalizeLink(link);
          const body = document.createElement('div');
          body.innerHTML = ''
            + '<div class="row"><div class="field"><label data-i18n="settings.switch"></label><select data-role="switch">' + switchOptionsHtml(link.switchId) + '</select></div>'
            + (link.type === 'dial' ? renderDialFields(link) : renderDualFields(link))
            + '<button class="remove" data-i18n="settings.remove"></button></div>'
            + '<div class="hint" data-i18n="' + (link.type === 'dial' ? 'settings.dialHint' : 'settings.dualHint') + '"></div>';

          const row = makeCollapsible(link, switchSummary(link), body);

          body.querySelector('[data-role="switch"]').addEventListener('change', (e) => {
            link.switchId = e.target.value;
            const sw = selectedSwitch(link);
            link.type = sw ? sw.type : '';
            link.mode = link.type === 'dial' ? 'dial' : 'dimmer';
            render();
          });

          const mode = body.querySelector('[data-role="mode"]');
          if (mode) mode.addEventListener('change', (e) => { link.mode = e.target.value; render(); });

          const light = body.querySelector('[data-role="light"]');
          if (light) light.addEventListener('change', (e) => { link.lightId = e.target.value; render(); });

          const light2 = body.querySelector('[data-role="light2"]');
          if (light2) light2.addEventListener('change', (e) => { link.lightId2 = e.target.value; render(); });

          const holdLight = body.querySelector('[data-role="holdLight"]');
          if (holdLight) holdLight.addEventListener('change', (e) => { link.holdLightId = e.target.value; render(); });

          const holdLight2 = body.querySelector('[data-role="holdLight2"]');
          if (holdLight2) holdLight2.addEventListener('change', (e) => { link.holdLightId2 = e.target.value; render(); });

          ['slot1', 'slot2', 'slot3'].forEach((role, slotIndex) => {
            const slot = body.querySelector('[data-role="' + role + '"]');
            if (slot) slot.addEventListener('change', (e) => { link.slots[slotIndex].lightId = e.target.value; render(); });
          });

          const fadeStep = body.querySelector('[data-role="fadeStep"]');
          if (fadeStep) fadeStep.addEventListener('input', (e) => { link.fadeStep = Math.abs(Number(e.target.value)); });

          body.querySelector('.remove').addEventListener('click', () => {
            links.splice(index, 1);
            render();
          });

          container.appendChild(row);
        });

        if (homeyRef) homeyRef.translateElement(container);
        updateCounts();
        renderSensors();
      }

      function renderSensors() {
        const container = document.getElementById('sensorLinks');
        const empty = document.getElementById('sensorEmpty');
        container.innerHTML = '';
        empty.style.display = sensorLinks.length ? 'none' : 'block';

        sensorLinks.forEach((link, index) => {
          link.mode = link.mode || 'normal';
          link.timeoutMinutes = Number.isFinite(Number(link.timeoutMinutes)) ? Math.max(1, Math.min(120, Number(link.timeoutMinutes))) : 5;
          link.sunsetBright = Number.isFinite(Number(link.sunsetBright)) ? Math.max(0, Math.min(100, Number(link.sunsetBright))) : 50;
          link.midnightBright = Number.isFinite(Number(link.midnightBright)) ? Math.max(0, Math.min(100, Number(link.midnightBright))) : 5;

          const isNight = link.mode === 'night';
          const body = document.createElement('div');
          body.innerHTML = ''
            + '<div class="row">'
            + '<div class="field"><label data-i18n="settings.sensor"></label><select data-role="sensor">' + sensorOptionsHtml(link.sensorId) + '</select></div>'
            + '<div class="field"><label data-i18n="settings.sensorLight"></label><select data-role="light">' + lightOptionsHtml(link.lightId) + '</select></div>'
            + '<div class="field"><label data-i18n="settings.sensorMode"></label><select data-role="mode">'
            + '<option value="normal"' + (link.mode === 'normal' ? ' selected' : '') + ' data-i18n="settings.sensorModeNormal"></option>'
            + '<option value="night"' + (link.mode === 'night' ? ' selected' : '') + ' data-i18n="settings.sensorModeNight"></option>'
            + '</select></div>'
            + '<div class="field"><label data-i18n="settings.sensorTimeout"></label><input class="step" type="number" min="1" max="120" data-role="timeoutMinutes" value="' + link.timeoutMinutes + '"></div>'
            + '<div class="field" style="' + (isNight ? '' : 'display:none') + '"><label data-i18n="settings.sensorSunsetBright"></label><input class="step" type="number" min="0" max="100" data-role="sunsetBright" value="' + link.sunsetBright + '"></div>'
            + '<div class="field" style="' + (isNight ? '' : 'display:none') + '"><label data-i18n="settings.sensorMidnightBright"></label><input class="step" type="number" min="0" max="100" data-role="midnightBright" value="' + link.midnightBright + '"></div>'
            + '<button class="remove" data-i18n="settings.remove"></button></div>';

          const row = makeCollapsible(link, sensorSummary(link), body);

          body.querySelector('[data-role="sensor"]').addEventListener('change', (e) => { link.sensorId = e.target.value; renderSensors(); });
          body.querySelector('[data-role="light"]').addEventListener('change', (e) => { link.lightId = e.target.value; renderSensors(); });
          const mode = body.querySelector('[data-role="mode"]');
          if (mode) mode.addEventListener('change', (e) => { link.mode = e.target.value; renderSensors(); });
          const timeout = body.querySelector('[data-role="timeoutMinutes"]');
          if (timeout) timeout.addEventListener('change', (e) => { link.timeoutMinutes = Math.max(1, Math.min(120, Number(e.target.value))); renderSensors(); });
          if (timeout) timeout.addEventListener('input', (e) => { link.timeoutMinutes = Math.max(1, Math.min(120, Number(e.target.value))); });
          const sunsetBright = body.querySelector('[data-role="sunsetBright"]');
          if (sunsetBright) sunsetBright.addEventListener('input', (e) => { link.sunsetBright = Math.max(0, Math.min(100, Number(e.target.value))); });
          const midnightBright = body.querySelector('[data-role="midnightBright"]');
          if (midnightBright) midnightBright.addEventListener('input', (e) => { link.midnightBright = Math.max(0, Math.min(100, Number(e.target.value))); });
          body.querySelector('.remove').addEventListener('click', () => {
            sensorLinks.splice(index, 1);
            renderSensors();
          });

          container.appendChild(row);
        });

        if (homeyRef) homeyRef.translateElement(container);
        updateCounts();
      }

      function onHomeyReady(Homey) {
        homeyRef = Homey;

        Homey.get('pat', (err, value) => {
          if (!err && typeof value === 'string') {
            const el = document.getElementById('pat');
            if (el) el.value = value;
          }
        });

        Homey.get('links', (err, value) => {
          if (!err && Array.isArray(value)) {
            links = value.map((l) => normalizeLink({
              switchId: l.switchId || '',
              type: l.type || '',
              mode: l.mode || 'dimmer',
              lightId: l.lightId || '',
              lightId2: l.lightId2 || '',
              holdLightId: l.holdLightId || '',
              holdLightId2: l.holdLightId2 || '',
              slots: Array.isArray(l.slots) ? l.slots : [{ lightId: '' }, { lightId: '' }, { lightId: '' }],
              fadeStep: Number.isFinite(Number(l.fadeStep)) ? Math.abs(Number(l.fadeStep)) : 8,
            }));
          }
        });

        Homey.get('sensorLinks', (err, value) => {
          if (!err && Array.isArray(value)) {
            sensorLinks = value.map((l) => ({
              sensorId: l.sensorId || '',
              lightId: l.lightId || '',
              mode: l.mode || 'normal',
              timeoutMinutes: Number.isFinite(Number(l.timeoutMinutes)) ? Math.max(1, Math.min(120, Number(l.timeoutMinutes))) : 5,
              sunsetBright: Number.isFinite(Number(l.sunsetBright)) ? Math.max(0, Math.min(100, Number(l.sunsetBright))) : 50,
              midnightBright: Number.isFinite(Number(l.midnightBright)) ? Math.max(0, Math.min(100, Number(l.midnightBright))) : 5,
            }));
          }

          Homey.api('GET', '/devices', null, (apiErr, result) => {
            if (apiErr) {
              Homey.alert(apiErr.message || String(apiErr));
            } else {
              switches = result && Array.isArray(result.switches) ? result.switches : [];
              lights = result && Array.isArray(result.lights) ? result.lights : [];
              sensors = result && Array.isArray(result.sensors) ? result.sensors : [];
            }
            render();
            Homey.ready();
          });
        });

        document.getElementById('tabSwitches').addEventListener('click', () => setTab('switches'));
        document.getElementById('tabSensors').addEventListener('click', () => setTab('sensors'));

        document.getElementById('add').addEventListener('click', () => {
          setTab('switches');
          links.push({ switchId: '', type: '', mode: 'dimmer', lightId: '', lightId2: '', holdLightId: '', holdLightId2: '', slots: [{ lightId: '' }, { lightId: '' }, { lightId: '' }], fadeStep: 8, _open: true });
          render();
        });

        document.getElementById('addSensor').addEventListener('click', () => {
          setTab('sensors');
          sensorLinks.push({ sensorId: '', lightId: '', mode: 'normal', timeoutMinutes: 5, sunsetBright: 50, midnightBright: 5, _open: true });
          renderSensors();
        });

        document.getElementById('save').addEventListener('click', () => {
          const clean = links.map((l) => normalizeLink(l)).filter((l) => {
            if (!l.switchId) return false;
            if (l.type === 'dial') return l.slots.some((slot) => slot.lightId);
            if (l.mode === 'split') return l.lightId && l.lightId2;
            return l.lightId;
          });
          const cleanSensors = sensorLinks.filter((l) => l.sensorId && l.lightId);
          const patEl = document.getElementById('pat');
          const pat = patEl ? patEl.value.trim() : '';
          Homey.set('pat', pat, (patErr) => {
            if (patErr) return Homey.alert(patErr.message || String(patErr));
            Homey.set('links', clean, (err) => {
              if (err) return Homey.alert(err.message || String(err));
              links = clean;
              Homey.set('sensorLinks', cleanSensors, (sensorErr) => {
                if (sensorErr) return Homey.alert(sensorErr.message || String(sensorErr));
                sensorLinks = cleanSensors;
                render();
                Homey.alert(Homey.__('settings.saved'));
              });
            });
          });
        });

        setTab('switches');
      }
    </script>
  </body>
</html>
