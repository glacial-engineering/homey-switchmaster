  <circle cx="380" cy="120" r="30" fill="none" stroke="currentColor" stroke-width="22"/>
  <circle cx="120" cy="380" r="30" fill="none" stroke="currentColor" stroke-width="22"/>
  <circle cx="380" cy="380" r="30" fill="none" stroke="currentColor" stroke-width="22"/>
